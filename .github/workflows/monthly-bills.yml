name: Monthly Bills

on:
  schedule:
    # Run at 00:30 UTC on the 3rd day of every month (6:00 AM IST)
    - cron: '30 0 3 * *'
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: windows-latest  # Windows has Excel for better PDF conversion

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl python-dateutil pywin32

      - name: Run monthly bill generator
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: python run_bills_console.py
